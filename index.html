<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>น่าหนาวตามสั่ง</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: linear-gradient(135deg, #fdf6e3 0%, #fce4ec 50%, #e8f5e9 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: white;
    border-radius: 24px;
    padding: 40px 36px;
    max-width: 640px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
  }
  .screen { display: none; }
  .screen.active { display: block; }
  .start-emoji { font-size: 64px; text-align: center; margin-bottom: 16px; }
  .start-title { font-size: 26px; font-weight: 800; text-align: center; color: #1a1a1a; margin-bottom: 10px; line-height: 1.4; }
  .start-sub { font-size: 15px; color: #888; text-align: center; margin-bottom: 32px; line-height: 1.7; }
  .start-btn {
    display: block; width: 100%; padding: 16px;
    background: linear-gradient(135deg, #ff8a65, #f06292);
    border: none; border-radius: 14px;
    font-size: 17px; font-weight: 700; color: white;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(240,98,146,0.35);
    font-family: 'Sarabun', sans-serif;
  }
  .start-btn:hover { transform: translateY(-2px); }
  .progress-bar-wrap { background: #f0f0f0; border-radius: 99px; height: 8px; margin-bottom: 28px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 99px; background: linear-gradient(135deg, #ff8a65, #f06292); transition: width 0.4s ease; }
  .q-counter { font-size: 13px; color: #aaa; margin-bottom: 10px; text-align: right; }
  .q-text { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 24px; line-height: 1.7; }
  .choices { display: flex; flex-direction: column; gap: 12px; }
  .choice-btn {
    background: #fafafa; border: 1.5px solid #eee; border-radius: 14px;
    padding: 14px 18px; font-size: 15px; color: #333;
    cursor: pointer; text-align: left; transition: all 0.15s; line-height: 1.5;
    font-family: 'Sarabun', sans-serif;
  }
  .choice-label { font-weight: 700; color: #f06292; margin-right: 6px; }
  .choice-btn:hover { background: #fff5f8; border-color: #f06292; }
  .choice-btn.selected { background: linear-gradient(135deg, #fff5f8, #fff8f0); border-color: #ff8a65; color: #c0397a; font-weight: 600; }
  .result-emoji { font-size: 72px; text-align: center; margin-bottom: 12px; }
  .result-label { font-size: 13px; text-align: center; color: #aaa; letter-spacing: 2px; margin-bottom: 6px; }
  .result-name { font-size: 28px; font-weight: 800; text-align: center; color: #e64a7b; margin-bottom: 20px; line-height: 1.3; }
  .result-desc {
    background: #fff8f5; border-radius: 16px; padding: 20px 22px;
    font-size: 15px; color: #444; line-height: 1.8; margin-bottom: 24px;
    border: 1px solid #ffe0d0;
  }
  .result-scores { background: #fafafa; border-radius: 14px; padding: 16px 20px; margin-bottom: 24px; border: 1px solid #f0f0f0; }
  .result-scores-title { font-size: 13px; color: #aaa; margin-bottom: 12px; font-weight: 600; }
  .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .score-name { font-size: 13px; color: #555; width: 180px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .score-track { flex: 1; height: 8px; background: #eee; border-radius: 99px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #ffb3c6, #f06292); transition: width 1s ease; }
  .score-num { font-size: 12px; color: #aaa; width: 24px; text-align: right; flex-shrink: 0; }
  .retry-btn {
    display: block; width: 100%; padding: 15px;
    border: 2px solid #eee; border-radius: 14px;
    font-size: 15px; font-weight: 600; color: #888;
    background: white; cursor: pointer; transition: all 0.15s;
    font-family: 'Sarabun', sans-serif;
  }
  .retry-btn:hover { border-color: #ccc; color: #555; }
</style>
</head>
<body>
<div class="container">
  <div class="screen active" id="screen-start">
    <div class="start-emoji">🍜</div>
    <div class="start-title">น่าหนาวตามสั่ง</div>
    <div class="start-sub">ป้ามีเมนูพิเศษ 15 อย่าง<br>ตอบคำถาม 10 ข้อแล้วป้าจะแนะนำเมนูที่ใช่สำหรับหนูเอง 🍽️</div>
    <button class="start-btn" onclick="startQuiz()">เข้าร้านป้าเลย →</button>
  </div>
  <div class="screen" id="screen-quiz">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="q-counter" id="q-counter">ข้อ 1 / 10</div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
  </div>
  <div class="screen" id="screen-result">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-label">ป้าแนะนำเมนู</div>
    <div class="result-name" id="result-name"></div>
    <div class="result-desc" id="result-desc"></div>
    <div class="result-scores">
      <div class="result-scores-title">คะแนนทุกเมนู</div>
      <div id="score-bars"></div>
    </div>
    <button class="retry-btn" onclick="resetQuiz()">กลับมากินอีกครั้ง 🍜</button>
  </div>
</div>
<script>

  "ต้าตง": { emoji: "🔩", desc: "ป้าแนะนำให้ฉีดวัคซีนบาดทะยักก่อน เพราะมันให้รสชาติเหมือนกินสนิม แรกๆจะงงหลังๆจะปลงกับชีวิต ค้นพบสัจธรรม หลังจากนั้นกินได้หมดเพราะทนพิษบาดทะยัก" },

  "ต้าแหม่ม": { emoji: "🔥", desc: "เมนูมิชลินอีกหนึ่งร้านที่ป้าแนะนำ หนูเข้าใจสั่งนะจ๊ะ รสชาติดี เพราะเป็นจานที่เต็มไปด้วยโภชนาการ" },

      { text: "ชั้นเหงานะแต่ชั้นไม่ง่าย", menu: "บลูแหม่ม" },

      { text: "ตะโกนขอความช่วยเหลือ ไอ้หมอนี่มันจีบคุณแน่ๆ", menu: "ริน่าแหม่ม" }
    ]
  },
  {
    q: "แฟนคุณฝันว่าทะเลาะกับคุณ และตื่นเช้าจู่ๆ ก็โกรธคุณซะงั้น คุณงงมากว่ามันเกิดอะไรขึ้น ก็เลยถามเธอออกไปว่า...",
    choices: [
      { text: "คุณไม่ถามแต่แอบเนียนคุยให้มันลืมว่าโกรธคุณ", menu: "ต้าแหม่ม" },
      { text: "คุณไม่ถามเพราะชินแล้ว เดี๋ยวพรุ่งนี้มันก็ฝันอีก", menu: "บลูตง" },
      { text: "ถามตรงๆ ว่าในฝันมีตัวเลขมั้ย ถ้ามีก็รีบบอกมาเดี๋ยวมันอั้น", menu: "บลูแก้มหอม" },
      { text: "ทำกึงทำงงว่างอนอะไร แต่ก็ง้อจนตัวตาย", menu: "ริน่าแหม่ม" }
    ]
  },
  {
    q: "คุณติดเกมในมือถือมาก แม้แต่ตอนที่แฟนพูด จนแฟนพูดออกมาว่า 'หยุดเล่นเกมสักที พี่โฟกัสสองอย่างไม่ได้ด้วยซ้ำ' คุณจะ...",
    choices: [
      { text: "โหลดอีกเกมมาเล่นเพราะเคลียร์ด่านเกมนี้หมดแล้ว", menu: "บลูตง" },
      { text: "รับทราบแต่ไม่รับเรื่อง", menu: "บลูแหม่ม" },
      { text: "เล่นเกมต่อเพราะชินแล้ว ถึงไม่ใช่เกมมันก็หาเรื่องบ่นอยู่ทุกวัน", menu: "ต้าตง พิเศษบลู" },
      { text: "บอกเธอว่าไม่เล่นแล้ว พร้อมลบเกมในมือถือทิ้ง แต่ไปโหลดในไอแพดแทน", menu: "ต้าแก้มหอม พิเศษแหม่ม" }
    ]
  }
];

let currentQ = 0;
let scores = {};

function startQuiz() {
  currentQ = 0;
  scores = {};
  Object.keys(results).forEach(function(k) { scores[k] = 0; });
  showScreen('screen-quiz');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function renderQuestion() {
  var q = questions[currentQ];
  document.getElementById('q-counter').textContent = 'ข้อ ' + (currentQ + 1) + ' / ' + questions.length;
  document.getElementById('progress-bar').style.width = ((currentQ / questions.length) * 100) + '%';
  document.getElementById('q-text').textContent = q.q;
  var labels = ['A','B','C','D'];
  var choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach(function(c, i) {
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = '<span class="choice-label">' + labels[i] + '.</span>' + c.text;
    btn.onclick = function() { selectChoice(c.menu, btn); };
    choicesEl.appendChild(btn);
  });
}

function selectChoice(menu, btn) {
  document.querySelectorAll('.choice-btn').forEach(function(b) {
    b.classList.remove('selected');
    b.onclick = null;
  });
  btn.classList.add('selected');
  scores[menu] = (scores[menu] || 0) + 1;
  setTimeout(function() {
    currentQ++;
    if (currentQ < questions.length) renderQuestion();
    else showResult();
  }, 380);
}

function showResult() {
  var sorted = Object.entries(scores).filter(function(e) { return e[1] > 0; }).sort(function(a,b) { return b[1]-a[1]; });
  var topScore = sorted[0][1];
  var tied = sorted.filter(function(e) { return e[1] === topScore; });
  var winner = tied[Math.floor(Math.random() * tied.length)][0];
  var r = results[winner];
  var maxScore = sorted[0][1];
  document.getElementById('result-emoji').textContent = r.emoji;
  document.getElementById('result-name').textContent = winner;
  document.getElementById('result-desc').textContent = r.desc;
  var barsEl = document.getElementById('score-bars');
  barsEl.innerHTML = '';
  sorted.forEach(function(entry) {
    var pct = maxScore > 0 ? Math.round((entry[1]/maxScore)*100) : 0;
    var row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = '<div class="score-name">'+entry[0]+'</div><div class="score-track"><div class="score-fill" style="width:0%" data-pct="'+pct+'"></div></div><div class="score-num">'+entry[1]+'</div>';
    barsEl.appendChild(row);
  });
  showScreen('screen-result');
  setTimeout(function() {
    document.querySelectorAll('.score-fill').forEach(function(el) { el.style.width = el.dataset.pct+'%'; });
  }, 200);
}

function resetQuiz() { showScreen('screen-start'); }
</script>
