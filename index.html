<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คุณเป็นสายน่าหรือสายหนาว?</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: linear-gradient(135deg, #fce4f0 0%, #e8f4fd 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    background: white;
    border-radius: 24px;
    padding: 40px 36px;
    max-width: 640px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* START */
  .start-emoji { font-size: 60px; text-align: center; margin-bottom: 16px; }
  .start-title {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    color: #1a1a2e;
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .start-sub {
    font-size: 15px;
    color: #888;
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .start-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #f8a4c8, #a8c8f8);
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    color: white;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(248,164,200,0.4);
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(248,164,200,0.5); }

  /* QUIZ */
  .progress-bar-wrap {
    background: #f0f0f0;
    border-radius: 99px;
    height: 8px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(135deg, #f8a4c8, #a8c8f8);
    transition: width 0.4s ease;
  }
  .q-counter {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 10px;
    text-align: right;
  }
  .q-text {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .choices { display: flex; flex-direction: column; gap: 12px; }
  .choice-btn {
    background: #fafafa;
    border: 1.5px solid #eee;
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 15px;
    color: #333;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    line-height: 1.5;
  }
  .choice-btn:hover {
    background: #fff0f7;
    border-color: #f8a4c8;
    color: #c0397a;
  }
  .choice-btn.selected {
    background: linear-gradient(135deg, #fff0f7, #e8f4fd);
    border-color: #a8c8f8;
    color: #1a6abf;
    font-weight: 600;
  }

  /* RESULT */
  .result-emoji { font-size: 72px; text-align: center; margin-bottom: 16px; }
  .result-label {
    font-size: 14px;
    text-align: center;
    color: #aaa;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .result-name {
    font-size: 32px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 10px;
  }
  .result-name.na { color: #d4537e; }
  .result-name.nao { color: #378add; }

  .result-score-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 24px;
  }
  .score-label { font-size: 13px; font-weight: 700; width: 40px; text-align: center; }
  .score-label.na { color: #d4537e; }
  .score-label.nao { color: #378add; }
  .score-track {
    flex: 1;
    height: 12px;
    background: #f0f0f0;
    border-radius: 99px;
    overflow: hidden;
    position: relative;
  }
  .score-fill-na {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #f4c0d1, #d4537e);
    transition: width 1s ease;
  }
  .score-fill-nao {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #b5d4f4, #378add);
    transition: width 1s ease;
  }

  .result-desc {
    background: #fafafa;
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 15px;
    color: #444;
    line-height: 1.7;
    margin-bottom: 28px;
    border: 1px solid #f0f0f0;
  }
  .result-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
    margin: 0 4px 8px;
  }
  .tag-na { background: #fbeaf0; color: #993556; }
  .tag-nao { background: #e6f1fb; color: #185fa5; }

  .tags-wrap { text-align: center; margin-bottom: 24px; }

  .retry-btn {
    display: block;
    width: 100%;
    padding: 15px;
    border: 2px solid #eee;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    color: #888;
    background: white;
    cursor: pointer;
    transition: all 0.15s;
  }
  .retry-btn:hover { border-color: #ccc; color: #555; }

  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap');
</style>
</head>
<body>
<div class="container">

  <!-- START SCREEN -->
  <div class="screen active" id="screen-start">
    <div class="start-emoji">🌨️🍓</div>
    <div class="start-title">คุณเป็นสายน่าหรือสายหนาว?</div>
    <div class="start-sub">แบบทดสอบสุดฮา 10 ข้อ<br>ที่จะบอกว่าคุณเป็นสาย คาริน่า หรือ วินเทอร์ กันแน่!</div>
    <button class="start-btn" onclick="startQuiz()">เริ่มเลย →</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="screen-quiz">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:10%"></div>
    </div>
    <div class="q-counter" id="q-counter">ข้อ 1 / 10</div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="screen-result">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-label">คุณเป็น</div>
    <div class="result-name" id="result-name"></div>
    <div class="result-score-bar-wrap">
      <div class="score-label na">น่า</div>
      <div class="score-track">
        <div class="score-fill-na" id="bar-na" style="width:0%"></div>
      </div>
      <div class="score-label nao">หนาว</div>
      <div class="score-track">
        <div class="score-fill-nao" id="bar-nao" style="width:0%"></div>
      </div>
    </div>
    <div class="tags-wrap" id="result-tags"></div>
    <div class="result-desc" id="result-desc"></div>
    <button class="retry-btn" onclick="resetQuiz()">ทำแบบทดสอบอีกครั้ง</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "ถ้ามีสตอเบอร์รี่หล่นลงพื้น แต่เชื้อโรคยังไม่ทันได้เห็น คุณจะ...",
    choices: [
      { text: "เก็บเอาไปล้างแล้วกินต่อ เชื้อโรคยังไม่ทันเห็นก็ยังโอเค", score: "na" },
      { text: "โยนทิ้งลงถังขยะ ทำตัวกึงๆ แต่โยนไม่ลงถัง ต้องเดินไปเก็บลงถังเองอยู่ดี", score: "na" },
      { text: "เอายัดเข้าปากแฟน ถามมันพอเป็นพิธี ถ้าไม่กินก็ทำเป็นงอน เพราะเดี๋ยวมันก็กินเอง", score: "nao" },
      { text: "กรี๊ดออกมาเพราะไม่มีอะไรสักอย่างเลย", score: "nao" }
    ]
  },
  {
    q: "ในงานวันเกิดแฟน คุณปลีกตัวออกจากงานมาหาแฟนได้ แต่ในตอนนั้นเองเกิดฝนตกขึ้นกะทันหัน คุณจะ...",
    choices: [
      { text: "โทรบอกแฟนว่าไปไม่ได้แล้วนะ พี่ขอโทษ", score: "na" },
      { text: "เป็นเคะตัวแม่ วางท่าว่าจะไม่ไป แต่แอบไปเซอร์ไพร์สทีหลัง", score: "nao" },
      { text: "เพราะรู้ว่าฝนจะตก เลยรีบเคลียร์งานแล้วไปกอดเธอจนตัวลอย แล้วตามไปให้กำลังใจตอนเธอแสดง", score: "na" },
      { text: "เอาเกิบฟาดพระพิรุณ ตะโกนว่า ถ้าตกลงมามีเรื่องแน่ ชั้นรู้นะว่าใครอยู่ข้างบน", score: "na" }
    ]
  },
  {
    q: "มีจดหมายฉบับหนึ่งวางอยู่บนโต๊ะ ในนั้นเขียนว่า...",
    choices: [
      { text: "เราเหมือณเดชกับญาญ่าสมัยก่อนเลยเนอะ", score: "na" },
      { text: "ไหนเมื่อคืนบอกว่าจะอยู่โต้รุ่งด้วยกัน แต่หลับก่อนเพื่อ แล้วแต่นะ", score: "nao" },
      { text: "สตรอเบอร์รี่หนูอยู่ไหน พี่เป็นคนกินไปใช่ป่ะ จะเอางี้ใช่มะ", score: "nao" },
      { text: "ตัดผมสั้นอีกนะ แต่อย่าสกินเฮดละ", score: "na" }
    ]
  },
  {
    q: "ในตอนที่แฟนกำลังพูดถึงดินฟ้าอากาศอยู่ แต่มันทำให้คุณโกรธมากเพราะเขาไม่ได้พูดถึงเรื่องของคุณเลย คุณจะ...",
    choices: [
      { text: "แล้วแต่ทำไรก็ทำ แต่ไปไหนก็ไป", score: "nao" },
      { text: "คุยเรื่องอากาศของพรุ่งนี้ต่อเพราะคุณคือนักพยากรณ์อากาศ", score: "nao" },
      { text: "เล่นเกมต่อ เพราะคุณกึง", score: "na" },
      { text: "ไม่ทำอะไรแต่ไปพูดกับเพื่อนว่า คุณคงเข้าใจเธออยู่แหละ จบด้วยอีโมจิหน้ายิ้มกลับหัว", score: "nao" }
    ]
  },
  {
    q: "คุณกำลังเล่นสนุกอยู่กับกลุ่มเพื่อน แต่มีเพื่อนข้างๆ มาแอบจับมือใต้โต๊ะแน่น คุณจะ...",
    choices: [
      { text: "ตีมือให้กระดูกหัก เล่นไรไม่รู้เรื่อง", score: "nao" },
      { text: "แอบเนียนจับด้วย อย่าให้ใครรู้", score: "nao" },
      { text: "ทำหน้าเหม็นเบื่อ จิ๊ปากใส่", score: "nao" },
      { text: "หันไปมองทำหน้างงๆ แต่ก็ให้มันจับไปเพราะกลัวมันงอน", score: "na" }
    ]
  },
  {
    q: "คุณกำลังโมโหมากๆ แต่อยู่ๆ เพื่อนคนนั้นก็ถอนหายใจขึ้นมาเฉยๆ คุณมองว่าเขา...",
    choices: [
      { text: "กล้าถอนหายใจใส่ชั้นหรอ", score: "nao" },
      { text: "คนอะไรเนี่ย แค่หายใจยังน่ารักเลย", score: "na" },
      { text: "ถอนหายใจตาม เพราะเบื่อมัน แทนที่จะช่วยกันโมโห", score: "nao" },
      { text: "หายโมโหเรื่องนั้นแล้วไปโมโหมันแทน", score: "nao" }
    ]
  },
  {
    q: "คุณแอบชอบรุ่นพี่คนหนึ่งอยู่ แต่เขาตัวติดกับเพื่อนคนหนึ่งมาก และคุณเป็นสาววาย คุณจะ...",
    choices: [
      { text: "จับชงจิ้นจนอีลอนปิดกั้นการมองเห็น", score: "nao" },
      { text: "บอกกับพี่คนนั้นว่า พี่ไม่รักหนูไม่เป็นไรค่ะ แต่พี่ต้องรักเค้านะ", score: "nao" },
      { text: "บอกต่อความอร่อย ขายจิ้นให้คนมามุง", score: "nao" },
      { text: "ถามออกไปด้วยความสงสัย พี่เป็นแฟนกันรึเปล่าคะ", score: "nao" }
    ]
  },
  {
    q: "คุณกำลังนั่งรถอยู่แต่จู่ๆ ก็ง่วงขึ้นมา มีเพื่อนคนหนึ่งเสนอให้พิงไหล่เค้านอน คุณคิดว่า...",
    choices: [
      { text: "ไอ้หมอนี่มันกึงอะไรของมันอะ", score: "nao" },
      { text: "ชั้นเหงานะแต่ชั้นไม่ง่าย", score: "nao" },
      { text: "ปากบอกว่าไม่แต่ก็พิงมันหลับอยู่ดี", score: "nao" },
      { text: "ตะโกนขอความช่วยเหลือ ไอ้หมอนี่มันจีบคุณแน่ๆ", score: "nao" }
    ]
  },
  {
    q: "แฟนคุณฝันว่าทะเลาะกับคุณ และตื่นเช้าจู่ๆ ก็โกรธคุณซะงั้น คุณงงมากว่ามันเกิดอะไรขึ้น ก็เลยถามเธอออกไปว่า...",
    choices: [
      { text: "คุณไม่ถามแต่แอบเนียนคุยให้มันลืมว่าโกรธคุณ", score: "na" },
      { text: "คุณไม่ถามเพราะชินแล้ว เดี๋ยวพรุ่งนี้มันก็ฝันอีก", score: "na" },
      { text: "ถามตรงๆ ว่าในฝันมีตัวเลขมั้ย ถ้ามีก็รีบบอกมาเดี๋ยวมันอั้น", score: "na" },
      { text: "ทำกึงทำงงว่างอนอะไร แต่ก็ง้อจนตัวตาย", score: "na" }
    ]
  },
  {
    q: "คุณติดเกมในมือถือมาก แม้แต่ตอนที่แฟนพูด จนแฟนพูดออกมาว่า 'หยุดเล่นเกมสักที พี่โฟกัสสองอย่างไม่ได้ด้วยซ้ำ' คุณจะ...",
    choices: [
      { text: "โหลดอีกเกมมาเล่นเพราะเคลียร์ด่านเกมนี้หมดแล้ว", score: "na" },
      { text: "รับทราบแต่ไม่รับเรื่อง", score: "na" },
      { text: "เล่นเกมต่อเพราะชินแล้ว ถึงไม่ใช่เกมมันก็หาเรื่องบ่นอยู่ทุกวัน", score: "na" },
      { text: "บอกเธอว่าไม่เล่นแล้ว พร้อมลบเกมในมือถือทิ้ง แต่ไปโหลดในไอแพดแทน", score: "na" }
    ]
  }
];

const results = {
  na: {
    emoji: "🍓",
    name: "สายน่า (คาริน่า)",
    nameClass: "na",
    tags: ["กึงนิดหน่อย", "นิ่งแต่แอบ", "ไม่แคร์แต่แคร์", "มึนๆ"],
    tagClass: "tag-na",
    desc: "คุณคือสายน่า! ดูเหมือนไม่แคร์แต่จริงๆ แคร์มากที่สุด ทำท่าไม่สนแต่แอบมองตาเป็น 👀 สไตล์ 'ก็ได้ แล้วแต่' แต่ถ้าใครทำตามที่บอกจริงๆ ก็งอนนะ 555 คุณคือ chaos ในร่างที่ดูนิ่ง"
  },
  nao: {
    emoji: "❄️",
    name: "สายหนาว (วินเทอร์)",
    nameClass: "nao",
    tags: ["จริงจัง", "ซึ้งในใจ", "งอนเป็นงาน", "โรแมนติก"],
    tagClass: "tag-nao",
    desc: "คุณคือสายหนาว! จริงจังกับความรักมาก ถ้าโกรธก็โกรธเต็มๆ ถ้าซึ้งก็ซึ้งเต็มๆ ไม่มีสีเทา มีแต่ขาวกับดำ 🖤🤍 คนรักได้ยินชื่อคุณแล้วต้องกลืนน้ำลาย เพราะรู้ว่าคุณไม่ได้เล่น"
  }
};

let currentQ = 0;
let scores = { na: 0, nao: 0 };

function startQuiz() {
  currentQ = 0;
  scores = { na: 0, nao: 0 };
  showScreen('screen-quiz');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-counter').textContent = `ข้อ ${currentQ + 1} / ${questions.length}`;
  document.getElementById('progress-bar').style.width = `${((currentQ) / questions.length) * 100}%`;
  document.getElementById('q-text').textContent = q.q;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    btn.onclick = () => selectChoice(i, c.score);
    choicesEl.appendChild(btn);
  });
}

function selectChoice(idx, score) {
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.classList.remove('selected'));
  btns[idx].classList.add('selected');

  scores[score]++;

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 400);
}

function showResult() {
  const winner = scores.na >= scores.nao ? 'na' : 'nao';
  const r = results[winner];
  const total = scores.na + scores.nao;
  const naPercent = Math.round((scores.na / total) * 100);
  const naoPercent = Math.round((scores.nao / total) * 100);

  document.getElementById('result-emoji').textContent = r.emoji;
  const nameEl = document.getElementById('result-name');
  nameEl.textContent = r.name;
  nameEl.className = 'result-name ' + r.nameClass;
  document.getElementById('result-desc').textContent = r.desc;

  const tagsEl = document.getElementById('result-tags');
  tagsEl.innerHTML = r.tags.map(t => `<span class="result-tag ${r.tagClass}">${t}</span>`).join('');

  showScreen('screen-result');

  setTimeout(() => {
    document.getElementById('bar-na').style.width = naPercent + '%';
    document.getElementById('bar-nao').style.width = naoPercent + '%';
  }, 200);
}

function resetQuiz() {
  showScreen('screen-start');
}
</script>
</body>
</html>
